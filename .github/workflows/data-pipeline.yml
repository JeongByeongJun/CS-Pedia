name: Data Pipeline

on:
  schedule:
    - cron: "0 18 * * 0" # Every Monday at 3 AM KST (Sunday 6 PM UTC)
  workflow_dispatch:
    inputs:
      phase:
        description: "Which phase to run (all / keywords)"
        required: false
        default: "all"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Run data pipeline
        run: |
          if [ "${{ github.event.inputs.phase }}" = "keywords" ]; then
            echo "Running Phase 3 (keywords) only..."
            pnpm exec tsx scripts/pipeline/keywords-only.ts
          else
            echo "Running full pipeline..."
            pnpm exec tsx scripts/pipeline/index.ts
          fi
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Commit pipeline report
        if: success() && github.event.inputs.phase != 'keywords'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/pipeline/pipeline-report.txt
          git diff --cached --quiet || git commit -m "chore: update pipeline report"
          git push

      - name: Trigger ISR revalidation
        if: success()
        run: |
          curl -s -X POST "${{ secrets.SITE_URL }}/api/revalidate?secret=${{ secrets.REVALIDATE_SECRET }}" || true
