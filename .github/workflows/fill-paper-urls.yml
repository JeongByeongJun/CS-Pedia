name: Fill Best Paper URLs

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fill-urls:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Fill paper URLs from Semantic Scholar
        run: pnpm exec tsx scripts/pipeline/fill-paper-urls.ts

      - name: Commit updated best-papers.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/infrastructure/seed/best-papers.json
          git diff --cached --quiet || git commit -m "data: fill best paper URLs from Semantic Scholar"
          git push

      - name: Seed to Supabase
        run: pnpm exec tsx --env-file=.env.local scripts/seed.ts || true
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
