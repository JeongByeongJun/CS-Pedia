name: Verify Best Papers

on:
  workflow_dispatch:
    inputs:
      batch:
        description: "Batch number (1-16, 100 papers each)"
        required: true
        default: "1"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Verify batch ${{ github.event.inputs.batch }}
        run: pnpm exec tsx scripts/verify-best-papers.ts ${{ github.event.inputs.batch }}

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: verify-report-batch-${{ github.event.inputs.batch }}
          path: scripts/verify-report-*.txt
